<script>
"use strict";
const MHEAD_SVG='<svg viewBox="0 0 100 100" width="30" height="30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="mh" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF2F5"/><stop offset=".62" stop-color="#FFC7DA"/><stop offset="1" stop-color="#F09BB8"/></linearGradient></defs><ellipse cx="50" cy="90" rx="24" ry="4.4" fill="rgba(40,25,10,.10)"/><rect x="15" y="19" width="70" height="63" rx="29" fill="url(#mh)" stroke="#F09BB8" stroke-width="1.5"/><ellipse cx="36" cy="34" rx="14" ry="8" fill="rgba(255,255,255,.55)"/><rect x="21.5" y="54" width="12" height="8.5" rx="4" fill="#FFB0C4" opacity=".82"/><rect x="66.5" y="54" width="12" height="8.5" rx="4" fill="#FFB0C4" opacity=".82"/><rect x="31" y="38.5" width="11" height="15" rx="5.5" fill="#33405c"/><rect x="58" y="38.5" width="11" height="15" rx="5.5" fill="#33405c"/><rect x="33.4" y="41" width="3.7" height="5" rx="1.85" fill="#fff"/><rect x="60.4" y="41" width="3.7" height="5" rx="1.85" fill="#fff"/><path d="M24 17 L26 22 L31 24 L26 26 L24 31 L22 26 L17 24 L22 22 Z" fill="#FFC94D"/><path d="M77 19 L79 24 L84 26 L79 28 L77 33 L75 28 L70 26 L75 24 Z" fill="#FFC94D"/><path d="M40.5 58 Q50 72 59.5 58 Z" fill="#E8657F"/><path d="M44 62 Q50 66 56 62" fill="#F49BB1"/></svg>';

const SUN='☀️', MOON='🌙';

/* ===== 사운드 + 햅틱 ===== */
let AC=null, MUTED=false; try{MUTED=localStorage.getItem('mallow_mute')==='1';}catch(e){}
function actx(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return AC; }
function tone(f,st,dur,type,vol){ if(MUTED)return; const ac=actx(); if(!ac)return; if(ac.state==='suspended')ac.resume();
  const o=ac.createOscillator(),g=ac.createGain(),t=ac.currentTime+st; o.type=type||'sine'; o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(ac.destination); o.start(t); o.stop(t+dur+0.03); }
function vib(p){ try{ if(!MUTED&&navigator.vibrate) navigator.vibrate(p); }catch(e){} }
function sndSun(){ tone(660,0,0.08,'triangle',0.15); tone(990,0.045,0.09,'triangle',0.10); vib(12); }   // 해
function sndMoon(){ tone(392,0,0.09,'triangle',0.15); tone(523,0.045,0.09,'triangle',0.10); vib(12); }  // 달
function sndCancel(){ tone(300,0,0.10,'sine',0.10); }                                                    // 취소(빈칸)
function sndBad(){ tone(160,0,0.16,'square',0.10); tone(120,0.09,0.17,'square',0.09); vib([25,40,25]); } // 규칙 위반
function sndWin(){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,i*0.10,0.34,'triangle',0.17)); vib([18,50,18,50,30]); }
['pointerdown','touchend','keydown'].forEach(ev=>document.addEventListener(ev,()=>{const ac=actx();if(ac&&ac.state==='suspended')ac.resume();},{passive:true}));
function toggleMute(){ MUTED=!MUTED; try{localStorage.setItem('mallow_mute',MUTED?'1':'0');}catch(e){} const b=document.getElementById('muteBtn'); if(b)b.textContent=MUTED?'🔇':'🔊'; if(!MUTED)sndCancel(); }

/* ===== i18n ===== */
const TX={
 ko:{home:'홈',title:'탱고',tagline:'해와 달을 채우는 논리 퍼즐',clear:'지우기',
   date:d=>'📅 '+d+' 오늘의 퍼즐',hint:'빈칸 탭 → ☀️ → 🌙 → 빈칸. 같은 것이 <b>3연속 금지</b>, 각 줄에 해·달 <b>개수가 같게</b> 채우면 완성!',
   disc:'매일 자정(KST) 새 퍼즐이 나와요. 오직 <b>논리</b>로 유일한 정답을 풀 수 있게 만들어집니다 🌗',footer:'가볍게 즐기는 두뇌게임',
   newGame:'새 퍼즐',share:'📷 결과 공유',again:'다시 풀기',won:'클리어! 🌗',wonTime:t=>'걸린 시간 '+t,
   share1:'말로우 탱고',share2:d=>d+' 데일리',shareText:t=>'말로우 탱고 클리어! 🌗 '+t+' playmallow.com/tango',docTitle:'말로우 탱고 — 오늘의 해·달 퍼즐 (Tango) | Mallow',
   toastBad:'규칙 위반! 빨간 칸을 확인하세요.'},
 en:{home:'Home',title:'Tango',tagline:'Fill the grid with suns & moons',clear:'Clear',
   date:d=>'📅 '+d+' Daily Puzzle',hint:'Tap a cell → ☀️ → 🌙 → empty. Never <b>3 in a row</b> of the same, and each line needs an <b>equal number</b> of suns and moons!',
   disc:'A new puzzle every midnight (KST). Each one has a single answer solvable by <b>pure logic</b> 🌗',footer:'brain games, made light',
   newGame:'New puzzle',share:'📷 Share result',again:'Play again',won:'Solved! 🌗',wonTime:t=>'Time '+t,
   share1:'Mallow Tango',share2:d=>d+' Daily',shareText:t=>'Solved Mallow Tango! 🌗 '+t+' playmallow.com/tango',docTitle:'Mallow Tango — Daily Sun & Moon Puzzle | Mallow',
   toastBad:'Rule broken! Check the red cells.'},
 th:{home:'หน้าแรก',title:'แทงโก้',tagline:'เติมดวงอาทิตย์และดวงจันทร์',clear:'ล้าง',
   date:d=>'📅 '+d+' ปริศนาวันนี้',hint:'แตะช่อง → ☀️ → 🌙 → ว่าง ห้ามเหมือนกัน <b>3 ช่องติด</b> และแต่ละแถวต้องมีอาทิตย์กับจันทร์ <b>จำนวนเท่ากัน</b>!',
   disc:'ปริศนาใหม่ทุกเที่ยงคืน (KST) ทุกด่านมีคำตอบเดียว แก้ได้ด้วย<b>ตรรกะ</b>ล้วน 🌗',footer:'เกมสมองเบา ๆ',
   newGame:'ปริศนาใหม่',share:'📷 แชร์ผล',again:'เล่นอีกครั้ง',won:'สำเร็จ! 🌗',wonTime:t=>'เวลา '+t,
   share1:'Mallow แทงโก้',share2:d=>d+' รายวัน',shareText:t=>'แก้ Mallow แทงโก้สำเร็จ! 🌗 '+t+' playmallow.com/tango',docTitle:'Mallow แทงโก้ — ปริศนาอาทิตย์จันทร์รายวัน | Mallow',
   toastBad:'ผิดกฎ! ดูช่องสีแดง'}
};
let LANG='ko';
function detectLang(){let l=null;try{l=new URLSearchParams(location.search).get('lang');}catch(e){}if(!l){try{l=localStorage.getItem('brain.lang');}catch(e){}}return ['ko','en','th'].includes(l)?l:'ko';}

/* ===== 생성기(.logs/tango_sim.mjs 검증본 이식) ===== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return h>>>0;}
function kstDate(){return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10);}
function shuf(a,rng){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function genSolution(N,rng){const g=Array.from({length:N},()=>new Array(N).fill(-1));
  const rc=new Array(N).fill(0),cc=new Array(N).fill(0),rz=new Array(N).fill(0),cz=new Array(N).fill(0);const half=N/2;
  function valid(r,c,v){if(c>=2&&g[r][c-1]===v&&g[r][c-2]===v)return false;if(r>=2&&g[r-1][c]===v&&g[r-2][c]===v)return false;
    if(v===1){if(rc[r]+1>half||cc[c]+1>half)return false;}else{if(rz[r]+1>half||cz[c]+1>half)return false;}return true;}
  function bt(idx){if(idx===N*N)return true;const r=Math.floor(idx/N),c=idx%N;
    for(const v of shuf([0,1],rng)){if(valid(r,c,v)){g[r][c]=v;if(v===1){rc[r]++;cc[c]++;}else{rz[r]++;cz[c]++;}if(bt(idx+1))return true;g[r][c]=-1;if(v===1){rc[r]--;cc[c]--;}else{rz[r]--;cz[c]--;}}}return false;}
  return bt(0)?g:null;}
function countSol(N,given,limit){const g=given.map(row=>row.slice());
  const rc=new Array(N).fill(0),cc=new Array(N).fill(0),rz=new Array(N).fill(0),cz=new Array(N).fill(0);
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){const v=g[r][c];if(v===1){rc[r]++;cc[c]++;}else if(v===0){rz[r]++;cz[c]++;}}
  const half=N/2;let cnt=0;
  function valid(r,c,v){if(c>=2&&g[r][c-1]===v&&g[r][c-2]===v)return false;if(c>=1&&c+1<N&&g[r][c-1]===v&&g[r][c+1]===v)return false;if(c+2<N&&g[r][c+1]===v&&g[r][c+2]===v)return false;
    if(r>=2&&g[r-1][c]===v&&g[r-2][c]===v)return false;if(r>=1&&r+1<N&&g[r-1][c]===v&&g[r+1][c]===v)return false;if(r+2<N&&g[r+1][c]===v&&g[r+2][c]===v)return false;
    if(v===1){if(rc[r]+1>half||cc[c]+1>half)return false;}else{if(rz[r]+1>half||cz[c]+1>half)return false;}return true;}
  function bt(idx){if(cnt>=limit)return;if(idx===N*N){cnt++;return;}const r=Math.floor(idx/N),c=idx%N;
    if(g[r][c]!==-1){bt(idx+1);return;}
    for(const v of [0,1]){if(valid(r,c,v)){g[r][c]=v;if(v===1){rc[r]++;cc[c]++;}else{rz[r]++;cz[c]++;}bt(idx+1);g[r][c]=-1;if(v===1){rc[r]--;cc[c]--;}else{rz[r]--;cz[c]--;}}}}
  bt(0);return cnt;}
function makePuzzle(N,sol,rng){const given=sol.map(row=>row.slice());const cells=shuf([...Array(N*N).keys()],rng);
  for(const idx of cells){const r=Math.floor(idx/N),c=idx%N,bak=given[r][c];given[r][c]=-1;if(countSol(N,given,2)!==1)given[r][c]=bak;}
  return given;}
function genDaily(N,daySeed){for(let k=0;k<50;k++){const rng=mulberry32((daySeed+k*2654435761)>>>0);const sol=genSolution(N,rng);if(!sol)continue;return {given:makePuzzle(N,sol,rng),sol};}return null;}

/* ===== 상태 ===== */
let N=6, GIVEN=null, ST=null, DAILY=true, WON=false, startT=0, tick=null;
function fmt(ms){const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function startTimer(){startT=Date.now();if(tick)clearInterval(tick);tick=setInterval(()=>{if(!WON)document.getElementById('timer').textContent=fmt(Date.now()-startT);},500);}
let _rc=0; function rnd(){_rc=(_rc*1103515245+12345)&0x7fffffff;return ((Date.now()%100000)+_rc%100000)/100000%1;}

function newPuzzle(daily){
  DAILY=daily; WON=false;
  const seed = daily ? hashStr('tango|'+N+'|'+kstDate()) : (hashStr('tango|'+N+'|r')^Math.floor(rnd()*1e9))>>>0;
  const p=genDaily(N,seed); GIVEN=p.given;
  ST=GIVEN.map(row=>row.slice()); // -1 empty, 0 moon, 1 sun
  document.getElementById('wonBox').innerHTML=''; document.getElementById('timer').textContent='0:00';
  renderBoard(); renderBtns(); startTimer();
}
function renderBoard(){
  const b=document.getElementById('board'); b.style.gridTemplateColumns='repeat('+N+',1fr)'; b.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement('div'); d.className='cell'+(GIVEN[r][c]!==-1?' given':''); d.dataset.r=r; d.dataset.c=c;
    if(GIVEN[r][c]===-1) d.onclick=()=>tap(r,c);
    b.appendChild(d);
  }
  paint();
}
function sym(v){return v===1?SUN:(v===0?MOON:'');}
function paint(){
  const bad=conflicts();
  document.querySelectorAll('#board .cell').forEach(d=>{const r=+d.dataset.r,c=+d.dataset.c;
    d.textContent=sym(ST[r][c]); d.classList.toggle('bad',bad.has(r*N+c));});
}
function tap(r,c){ if(WON||GIVEN[r][c]!==-1) return; const v=ST[r][c]; const nv= v===-1?1:(v===1?0:-1); ST[r][c]=nv; paint();
  if(nv===-1){ sndCancel(); } else if(conflicts().has(r*N+c)){ sndBad(); } else { nv===1?sndSun():sndMoon(); }
  checkWin(); }
function conflicts(){
  const bad=new Set(), half=N/2;
  // 3연속
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){const v=ST[r][c];if(v===-1)continue;
    if(c+2<N&&ST[r][c+1]===v&&ST[r][c+2]===v){bad.add(r*N+c);bad.add(r*N+c+1);bad.add(r*N+c+2);}
    if(r+2<N&&ST[r+1][c]===v&&ST[r+2][c]===v){bad.add(r*N+c);bad.add((r+1)*N+c);bad.add((r+2)*N+c);}}
  // 개수 초과(한 줄에 해 또는 달이 half 초과)
  for(let r=0;r<N;r++){let s=0,m=0;for(let c=0;c<N;c++){if(ST[r][c]===1)s++;else if(ST[r][c]===0)m++;}
    if(s>half||m>half)for(let c=0;c<N;c++)if(ST[r][c]!==-1)bad.add(r*N+c);}
  for(let c=0;c<N;c++){let s=0,m=0;for(let r=0;r<N;r++){if(ST[r][c]===1)s++;else if(ST[r][c]===0)m++;}
    if(s>half||m>half)for(let r=0;r<N;r++)if(ST[r][c]!==-1)bad.add(r*N+c);}
  return bad;
}
function checkWin(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(ST[r][c]===-1) return;
  if(conflicts().size>0){ toast(TX[LANG].toastBad); return; }
  WON=true; if(tick)clearInterval(tick); const t=fmt(Date.now()-startT); sndWin();
  gtag('event','tango_win',{size:N,daily:DAILY});
  if(DAILY){ try{localStorage.setItem('tango_done',kstDate());}catch(e){} }
  const d=TX[LANG];
  document.getElementById('wonBox').innerHTML='<div class="won"><div class="big">'+d.won+'</div><div class="t">'+d.wonTime(t)+'</div></div>';
  document.getElementById('btns').innerHTML='<button class="btn" id="shareBtn">'+d.share+'</button><button class="btn sub" id="againBtn">'+d.again+'</button>';
  document.getElementById('shareBtn').onclick=()=>share(t);
  document.getElementById('againBtn').onclick=()=>newPuzzle(false);
}
function renderBtns(){const d=TX[LANG];document.getElementById('btns').innerHTML='<button class="btn sub" id="newBtn">🔀 '+d.newGame+'</button>';document.getElementById('newBtn').onclick=()=>newPuzzle(false);}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600);}

/* ===== 공유 카드 ===== */
const logoImg=new Image(); logoImg.src='/mallow-logo.svg';
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function drawCard(t){
  const cv=document.getElementById('shareCanvas'),c=cv.getContext('2d'),W=600,H=820,d=TX[LANG];
  const g=c.createLinearGradient(0,0,0,H);g.addColorStop(0,'#8b6ff0');g.addColorStop(1,'#ff8aa0');c.fillStyle=g;c.fillRect(0,0,W,H);
  c.fillStyle='#fff';roundRect(c,40,50,W-80,H-100,28);c.fill();
  c.textAlign='center';c.textBaseline='alphabetic';
  c.font='800 34px "Apple SD Gothic Neo",Arial,sans-serif';
  const mw=50,gap=11,bw=c.measureText('Mallow').width,x0=(W-(mw+gap+bw))/2,topY=78;
  if(logoImg.complete&&logoImg.naturalWidth>0)c.drawImage(logoImg,x0,topY,mw,mw);
  c.textAlign='left';c.fillStyle='#2a2140';c.fillText('Mallow',x0+mw+gap,topY+mw*0.72);c.textAlign='center';
  c.font='700 20px "Apple SD Gothic Neo",sans-serif';c.fillStyle='#8b6ff0';c.fillText('🌗 '+d.share1,W/2,168);
  const cell=Math.min(58,Math.floor(360/N)), bw2=cell*N, bx=(W-bw2)/2, by=210;
  c.fillStyle='#efeaf9';roundRect(c,bx-6,by-6,bw2+12,bw2+12,12);c.fill();
  for(let r=0;r<N;r++)for(let cc=0;cc<N;cc++){const x=bx+cc*cell,y=by+r*cell;
    c.fillStyle=(GIVEN[r][cc]!==-1)?'#e2d8f7':'#ffffff';roundRect(c,x+2,y+2,cell-4,cell-4,7);c.fill();
    c.font=Math.floor(cell*0.6)+'px sans-serif';c.textBaseline='middle';c.fillText(sym(ST[r][cc]),x+cell/2,y+cell/2+1);c.textBaseline='alphabetic';}
  const yb=by+bw2+52;
  c.font='800 30px "Apple SD Gothic Neo",sans-serif';c.fillStyle='#2a2140';c.fillText(d.won+'  '+t,W/2,yb);
  c.font='600 18px "Apple SD Gothic Neo",sans-serif';c.fillStyle='#7d7495';c.fillText(d.share2(kstDate())+' · '+N+'×'+N,W/2,yb+34);
  c.font='800 22px "Apple SD Gothic Neo",Arial,sans-serif';c.fillStyle='#8b6ff0';c.fillText('www.playmallow.com',W/2,H-58);
  return cv;
}
function share(t){ gtag('event','tango_share',{}); const cv=drawCard(t);
  cv.toBlob(function(blob){const file=new File([blob],'mallow-tango.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],text:TX[LANG].shareText(t)}).catch(()=>{});}
    else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mallow-tango.png';a.click();}},'image/png'); }

/* ===== UI ===== */
function applyLang(){const d=TX[LANG];
  document.getElementById('langSel').value=LANG;
  document.getElementById('t-home').textContent=d.home;
  document.getElementById('t-title').textContent=d.title;
  document.getElementById('t-tagline').textContent=d.tagline;
  document.getElementById('t-clear').textContent=d.clear;
  document.getElementById('t-hint').innerHTML=d.hint;
  document.getElementById('t-disc').innerHTML=d.disc;
  document.getElementById('t-footer').textContent=d.footer;
  document.getElementById('dateBar').textContent=d.date(kstDate());
  document.title=d.docTitle;
  if(!WON) renderBtns();
}
function renderSizes(){const wrap=document.getElementById('sizes');wrap.innerHTML='';
  [6,8].forEach(n=>{const b=document.createElement('button');b.textContent=n+'×'+n;b.className=n===N?'on':'';b.onclick=()=>{N=n;renderSizes();newPuzzle(DAILY);};wrap.appendChild(b);});}
function setLang(l){LANG=['ko','en','th'].includes(l)?l:'ko';try{localStorage.setItem('brain.lang',LANG);}catch(e){}document.documentElement.lang=LANG;applyLang();}
document.getElementById('clearBtn').onclick=()=>{ if(WON)return; ST=GIVEN.map(row=>row.slice()); paint(); };

LANG=detectLang(); document.documentElement.lang=LANG;
document.getElementById('muteBtn').textContent=MUTED?'🔇':'🔊';
renderSizes(); applyLang(); newPuzzle(true);
</script>
