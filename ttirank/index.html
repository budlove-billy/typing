(function(){ var el=document.getElementById('mhead'); if(el) el.innerHTML=MHEAD_SVG; })();
const ZODIAC=[
 {n:'쥐',e:'🐭'},{n:'소',e:'🐮'},{n:'범',e:'🐯'},{n:'토끼',e:'🐰'},{n:'용',e:'🐲'},{n:'뱀',e:'🐍'},
 {n:'말',e:'🐴'},{n:'양',e:'🐑'},{n:'원숭이',e:'🐵'},{n:'닭',e:'🐔'},{n:'개',e:'🐶'},{n:'돼지',e:'🐷'}
];
// 순위 구간별 문구 풀 — 12띠에 겹치지 않게 배정(각 12개 이상)
const CM_HI=['막힘없이 트이는 하루! 자신 있게 밀어붙여요.','귀인이 돕는 날. 기분 좋은 소식이 와요.','하는 일마다 술술. 오늘의 주인공은 나!','작은 행운이 겹쳐요. 로또 같은 하루.','자신감이 빛나요. 도전엔 최고의 날.','미뤄둔 일이 술술 풀리는 쾌조의 하루.','노력한 만큼 결실이 눈에 보여요.','좋은 사람과의 인연이 반짝이는 날.','기회가 먼저 손 내미는 흐뭇한 하루.','마음먹은 대로 착착, 컨디션 최상!','작은 시도가 큰 보상으로 돌아와요.','주변의 응원까지 더해 날개 다는 날.'];
const CM_MID=['무난하고 편안한 하루. 리듬만 지켜요.','기복 없이 흘러가요. 기본에 충실하게.','오후로 갈수록 흐름이 좋아져요.','소소한 재미를 챙기면 만족스러워요.','한 박자 쉬어가도 좋은 날이에요.','평범 속에 작은 행운이 숨어 있어요.','서두르지 않으면 원하는 결과에 닿아요.','익숙한 일에서 안정감을 느끼는 하루.','작은 습관 하나가 기분을 살려줘요.','무리 없이 딱 알맞게 흘러가는 날.','주변을 살피면 뜻밖의 힌트가 와요.','오늘의 나에게 작은 선물을 줘 봐요.'];
const CM_LO=['서두르면 탈. 천천히 가면 무탈해요.','오늘은 정리·마무리가 잘 맞아요.','지출과 약속은 한 번 더 확인해요.','무리 대신 나를 먼저 챙기는 하루로.','말 한마디 아끼면 오해가 줄어요.','컨디션 관리가 최고의 재테크인 날.','욕심을 내려두면 마음이 가벼워져요.','작은 실수는 웃어넘기며 여유롭게.','조용히 재충전하기 좋은 하루예요.','급한 결정은 내일로 미뤄도 좋아요.','따뜻한 물 한 잔으로 페이스 조절.','기대를 낮추면 뜻밖의 만족이 와요.'];
const LUCK_COLORS=[{n:'코랄 핑크',x:'#ff8aa0'},{n:'라벤더',x:'#b79bf5'},{n:'민트',x:'#5ec6b0'},{n:'하늘',x:'#7fb3ff'},{n:'레몬',x:'#f5d64a'},{n:'살구',x:'#ffb877'},{n:'로즈',x:'#f06292'},{n:'올리브',x:'#9fb35a'},{n:'터콰이즈',x:'#2fc7c0'},{n:'플럼',x:'#a06ef8'},{n:'하양',x:'#f2f2f7'},{n:'남색',x:'#5b6b9e'}];
const LUCK_ITEMS=['따뜻한 커피','손거울','작은 화분','파란 펜','향초','텀블러','이어폰','손수건','종이 노트','귤 하나','우산','열쇠고리','머그컵','책갈피','작은 초콜릿','손목시계'];

function hashStr(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function kstDate(){return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10);}
function pick(rng,arr){return arr[Math.floor(rng()*arr.length)];}

let RANKED=[], MYZ=-1;

// 오늘 날짜 시드로 12띠에 점수 부여 → 순위 확정(하루 고정), 문구·행운은 겹치지 않게 배정
function seededShuffle(arr,rng){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function computeToday(){
  const day=kstDate();
  const rows=ZODIAC.map((z,i)=>{
    const rng=mulberry32(hashStr(day+'|tti|'+i));
    const score=rng(); // 0~1
    return {i,z,score,rng};
  });
  rows.sort((a,b)=>b.score-a.score);
  // 그날 하루 고정 시드로 풀을 섞어 순위 순서대로 겹치지 않게 배분
  const dayRng=mulberry32(hashStr(day+'|tti-assign'));
  const hi=seededShuffle(CM_HI,dayRng), mid=seededShuffle(CM_MID,dayRng), lo=seededShuffle(CM_LO,dayRng);
  const colors=seededShuffle(LUCK_COLORS,dayRng), items=seededShuffle(LUCK_ITEMS,dayRng);
  let hiN=0,midN=0,loN=0;
  RANKED=rows.map((r,rank)=>{
    const starN=5-Math.floor(rank/2.6); // 1~2등 5별 … 하위 2~3별
    const s=Math.max(2,Math.min(5,starN));
    let cm;
    if(rank<4) cm=hi[hiN++]; else if(rank<9) cm=mid[midN++]; else cm=lo[loN++];
    const lc=colors[rank%colors.length], li=items[rank%items.length];
    const ln=1+Math.floor(r.rng()*45);
    return {...r, rank, star:s, cm, lc, ln, li};
  });
  render();
}
function stars(n){return '★★★★★☆☆☆☆☆'.slice(5-n,10-n);}
function render(){
  document.getElementById('dateBar').textContent='📅 '+kstDate()+' 오늘의 띠 순위';
  // picker
  document.getElementById('picker').innerHTML=ZODIAC.map((z,i)=>
    '<button class="pick'+(i===MYZ?' sel':'')+'" onclick="selZ('+i+')"><div class="pe">'+z.e+'</div><div class="pn">'+z.n+'</div></button>').join('');
  // my box
  const mb=document.getElementById('myBox');
  if(MYZ>=0){ const me=RANKED.find(r=>r.i===MYZ);
    mb.innerHTML='<div class="mybox"><div class="big">'+me.z.e+' '+me.z.n+'띠 · 오늘 <b style="color:var(--p)">'+(me.rank+1)+'등</b> '+stars(me.star)+'</div>'+
      '<div class="lucky">🎁 행운의 색 <span class="swatch" style="background:'+me.lc.x+'"></span> '+me.lc.n+' · 숫자 '+me.ln+' · '+me.li+'</div></div>';
  } else mb.innerHTML='';
  // list
  document.getElementById('ranks').innerHTML=RANKED.map(r=>{
    const cls='rank'+(r.i===MYZ?' me':'')+(r.rank===0?' top1':r.rank===1?' top2':r.rank===2?' top3':'');
    const medal=r.rank===0?'🥇':r.rank===1?'🥈':r.rank===2?'🥉':(r.rank+1)+'';
    return '<div class="'+cls+'"><div class="no">'+medal+'</div><div class="em">'+r.z.e+'</div>'+
      '<div class="info"><div class="nm">'+r.z.n+'띠'+(r.i===MYZ?'<span class="metag">MY</span>':'')+'</div><div class="cm">'+r.cm+'</div></div>'+
      '<div class="st" role="img" aria-label="5점 만점에 '+r.star+'점">'+stars(r.star)+'</div></div>';
  }).join('');
  try{localStorage.setItem('ttirank_seen',kstDate());}catch(e){}
}
function selZ(i){ MYZ=i; try{localStorage.setItem('ttirank_z',String(i));}catch(e){} gtag('event','ttirank_pick',{z:ZODIAC[i].n}); render(); document.getElementById('myBox').scrollIntoView({behavior:'smooth',block:'center'}); }

/* 공유 카드 — Top5 + 내 띠 */
const logoImg=new Image(); logoImg.src='/mallow-logo.svg';
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function drawCard(){
  const cv=document.getElementById('shareCanvas'), c=cv.getContext('2d'), W=600,H=820;
  const g=c.createLinearGradient(0,0,0,H); g.addColorStop(0,'#b79bf5'); g.addColorStop(1,'#ff8aa0'); c.fillStyle=g; c.fillRect(0,0,W,H);
  c.fillStyle='#fff'; roundRect(c,40,50,W-80,H-100,28); c.fill();
  c.textAlign='center'; c.textBaseline='alphabetic';
  c.font='800 34px "Apple SD Gothic Neo",Arial,sans-serif';
  const mw=50,gap=11,bw=c.measureText('Mallow').width,x0=(W-(mw+gap+bw))/2,topY=72;
  if(logoImg.complete&&logoImg.naturalWidth>0){ c.drawImage(logoImg,x0,topY,mw,mw); }
  c.textAlign='left'; c.fillStyle='#2a2140'; c.fillText('Mallow',x0+mw+gap,topY+mw*0.72); c.textAlign='center';
  c.font='700 22px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#8b6ff0'; c.fillText('🐭 오늘의 띠 순위',W/2,168);
  c.font='600 15px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#7d7495'; c.fillText(kstDate(),W/2,192);
  const medal=['🥇','🥈','🥉','4','5'];
  for(let i=0;i<5;i++){ const r=RANKED[i], y=250+i*74;
    c.textAlign='left'; c.font='700 26px sans-serif'; c.fillStyle='#f0b429'; c.fillText(medal[i],80,y);
    c.font='40px sans-serif'; c.fillText(r.z.e,130,y+4);
    c.font='800 24px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#2a2140'; c.fillText(r.z.n+'띠',192,y);
    c.textAlign='right'; c.font='22px sans-serif'; c.fillStyle='#f0b429'; c.fillText(stars(r.star),W-80,y); }
  if(MYZ>=0){ const me=RANKED.find(r=>r.i===MYZ); c.textAlign='center';
    c.font='800 20px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#8b6ff0';
    c.fillText('내 '+me.z.n+'띠는 오늘 '+(me.rank+1)+'등! '+me.z.e,W/2,646); }
  c.textAlign='center'; c.font='800 22px "Apple SD Gothic Neo",Arial,sans-serif'; c.fillStyle='#8b6ff0'; c.fillText('www.playmallow.com',W/2,696);
  return cv;
}
function share(){ gtag('event','ttirank_share',{}); const cv=drawCard();
  cv.toBlob(function(blob){ const file=new File([blob],'mallow-ttirank.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){ navigator.share({files:[file],text:'오늘의 띠 순위 🐭 playmallow.com/ttirank'}).catch(()=>{}); }
    else{ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='mallow-ttirank.png'; a.click(); } },'image/png'); }

document.getElementById('shareBtn').onclick=share;
(function(){try{const z=localStorage.getItem('ttirank_z');if(z!==null)MYZ=+z;}catch(e){} computeToday();})();
</script>
