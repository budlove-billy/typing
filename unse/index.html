.row2{display:flex;gap:10px;}.row2>div{flex:1;}
.btn{display:block;width:100%;margin-top:16px;padding:14px 0;font-size:16px;font-weight:800;border:none;border-radius:14px;

.hero{text-align:center;padding:22px 18px 18px;}
.hero .emoji{font-size:66px;line-height:1;}

.btns .btn{margin-top:0;}
footer{font-size:11px;color:var(--sub);text-align:center;padding:6px 0 24px;}

      <option value="저녁">🌇 저녁 (15~20시)</option>
      <option value="밤">🌌 밤 (20~24시)</option>

    <div class="card hero">
      <div class="emoji" id="zEmoji">🐲</div>
      <div class="zname" id="zName">용띠</div>
      <div class="zsub" id="zSub"></div>
      <div class="elem-badge" id="elemBadge"></div>
      <div class="ilju" id="ilju"></div>

      <div class="stars" id="stars">★★★★☆</div>
      <div class="total" id="total"></div>

      <div class="sect-title">🍀 분야별 운세</div>
      <div id="fields"></div>

      <div class="sect-title">🎁 오늘의 행운</div>
      <div class="lucky">
        <div><div class="lk">행운의 색</div><div class="lv" id="luckColor"></div></div>

    </div>
  </div>
</main>

/* ---------- 유틸 ---------- */
function hashStr(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function kstDate(){const d=new Date(Date.now()+9*3600*1000);return d.toISOString().slice(0,10);}
function pick(rng,arr){return arr[Math.floor(rng()*arr.length)];}
function lvl(rng){const r=rng();return r<0.5?{c:'lv-good',t:'좋음'}:r<0.85?{c:'lv-mid',t:'보통'}:{c:'lv-low',t:'주의'};}

let LAST=null; // 공유용 상태

function compute(){
  const bv=document.getElementById('birth').value;
  if(!bv){ alert('생년월일을 입력해 주세요 🙂'); return; }
  const [Y,M,D]=bv.split('-').map(Number);
  const now=new Date(); if(new Date(bv)>now){ alert('미래 날짜는 볼 수 없어요 😅'); return; }
  const time=document.getElementById('btime').value;
  try{localStorage.setItem('unse_birth',bv);localStorage.setItem('unse_time',time);localStorage.setItem('unse_seen',kstDate());}catch(e){}
  gtag('event','unse_view',{});

  const zi=((Y-4)%12+12)%12, z=ZODIAC[zi];
  const elemKey=STEM_ELEM[((Y-4)%10+10)%10], el=ELEM[elemKey];
  // 일주(60갑자) + 일간(나 자신)
  const ij=iljuIdx(Y,M,D), ds=STEMS[ij%10], db=BRANCHES[ij%12];
  const iljuName=ds.k+db.k, iljuHanja=ds.h+db.h, dayElem=STEM_ELEM[ij%10];

  // 타고난 기질 (연주 띠·오행 + 일간)
  let traitTxt='<b>'+z.n+'띠</b>('+z.t+') · 태어난 해의 기운 <b>'+elemKey+'('+el.h+')</b><br>'+
    '날의 기운 <b>일간 '+ds.k+'('+ds.h+')·'+dayElem+'</b> — '+STEM_DESC[ij%10];
  if(time) traitTxt+='<br>'+TIME_FLAVOR[time];

  // 오늘의 운세(생일+오늘 시드)
  const rng=mulberry32(hashStr(bv+'|'+time+'|'+kstDate()));
  const starN=2+Math.floor(rng()*4); // 2~5
  const totalArr = starN>=4?TOTAL_HI : starN===3?TOTAL_MID : TOTAL_LO;
  const totalTxt=pick(rng,totalArr);
  const fields=[
    {i:'💗',n:'애정운',c:pick(rng,LOVE),v:lvl(rng)},
    {i:'💰',n:'금전운',c:pick(rng,MONEY),v:lvl(rng)},
    {i:'🍀',n:'건강운',c:pick(rng,HEALTH),v:lvl(rng)},
    {i:'📚',n:'학업·일운',c:pick(rng,WORK),v:lvl(rng)}
  ];
  const lc=pick(rng,LUCK_COLORS), ln=1+Math.floor(rng()*45), li=pick(rng,LUCK_ITEMS);
  const say=pick(rng,SAY);

  // 렌더
  document.getElementById('zEmoji').textContent=z.e;
  document.getElementById('zName').textContent=z.n+'띠';
  document.getElementById('zSub').textContent=Y+'년생 · '+M+'월 '+D+'일';
  const eb=document.getElementById('elemBadge'); eb.textContent=elemKey+'('+el.h+') 기운'; eb.style.background=el.bg; eb.style.color=el.fc;
  document.getElementById('ilju').textContent='일주 '+iljuName+'('+iljuHanja+')';
  document.getElementById('trait').innerHTML=traitTxt;
  document.getElementById('match').textContent='🤝 잘 맞는 띠: '+goodZodiac(zi);
  document.getElementById('todayLabel').textContent='· '+kstDate();
  const starEl=document.getElementById('stars'); starEl.textContent='★★★★★☆☆☆☆☆'.slice(5-starN,10-starN);
  starEl.setAttribute('role','img'); starEl.setAttribute('aria-label','오늘의 총운 5점 만점에 '+starN+'점');
  starEl.classList.toggle('smax', starN===5);
  document.body.setAttribute('data-star', String(starN));
  document.getElementById('total').textContent=totalTxt;
  document.getElementById('fields').innerHTML=fields.map(f=>
    '<div class="frow"><div class="fi">'+f.i+'</div><div class="ft"><div class="fn">'+f.n+'</div><div class="fc">'+f.c+'</div></div><div class="fv '+f.v.c+'">'+f.v.t+'</div></div>').join('');
  document.getElementById('luckColor').innerHTML='<span class="swatch" style="background:'+lc.x+'"></span>'+lc.n;
  document.getElementById('luckNum').textContent=ln;
  document.getElementById('luckItem').textContent=li;
  document.getElementById('say').textContent=say;

  document.getElementById('inputCard').style.display='none';
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
  LAST={z,el:elemKey,elc:el.color,starN,totalTxt,lc,ln,li,say,Y,ij:iljuName,ijh:iljuHanja};
}

/* ---------- 공유 카드 ---------- */
function wrap(ctx,text,x,y,maxW,lh){const words=text.split(' ');let line='',yy=y;for(const w of words){const test=line+w+' ';if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line.trim(),x,yy);line=w+' ';yy+=lh;}else line=test;}ctx.fillText(line.trim(),x,yy);return yy;}
const logoImg=new Image(); logoImg.src='/mallow-logo.svg';   // 공유카드 로고(핑크 웃는 마스코트)
function drawCard(){
  const L=LAST; const cv=document.getElementById('shareCanvas'), c=cv.getContext('2d'), W=600,H=820;
  const GRAD={5:['#f7c65a','#ff8aa0'],4:['#c79bf5','#ff8aa0'],3:['#b79bf5','#ff8aa0'],2:['#8fb2f0','#b79bf5']}[L.starN]||['#b79bf5','#ff8aa0'];
  const g=c.createLinearGradient(0,0,0,H); g.addColorStop(0,GRAD[0]); g.addColorStop(1,GRAD[1]); c.fillStyle=g; c.fillRect(0,0,W,H);
  c.fillStyle='#fff'; roundRect(c,40,50,W-80,H-100,28); c.fill();   // 흰 카드 50~720
  c.textAlign='center'; c.textBaseline='alphabetic';
  // 상단 브랜드: 마스코트 로고 + Mallow
  c.font='800 36px "Apple SD Gothic Neo",Arial,sans-serif';
  const mw=54, gap=12, bw=c.measureText('Mallow').width, x0=(W-(mw+gap+bw))/2, topY=74;
  if(logoImg.complete && logoImg.naturalWidth>0){ c.drawImage(logoImg, x0, topY, mw, mw); }
  c.textAlign='left'; c.fillStyle='#2a2140'; c.fillText('Mallow', x0+mw+gap, topY+mw*0.72);
  c.textAlign='center';
  // 띠
  c.font='90px sans-serif'; c.fillText(L.z.e,W/2,238);
  c.font='800 33px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#2a2140'; c.fillText(L.z.n+'띠 · '+L.el+'('+ELEM[L.el].h+')',W/2,288);
  c.font='700 19px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#7d7495'; c.fillText('일주 '+L.ij+'('+L.ijh+')',W/2,318);
  c.font='30px sans-serif'; c.fillStyle='#f0b429'; c.fillText('★★★★★☆☆☆☆☆'.slice(5-L.starN,10-L.starN),W/2,360);
  c.font='600 22px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#3a3255'; wrap(c,L.totalTxt,W/2,406,W-150,34);
  // 행운
  c.font='700 19px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#7d7495';
  c.fillText('행운의 색',W/2-120,522); c.fillText('행운의 숫자',W/2+120,522);
  c.beginPath(); c.arc(W/2-120,566,18,0,7); c.fillStyle=L.lc.x; c.fill();
  c.font='800 34px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#2a2140'; c.fillText(L.ln,W/2+120,578);
  c.font='700 20px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#8b6ff0'; wrap(c,L.say,W/2,640,W-150,30);
  // 하단 URL — 흰 카드 안 진한 글자로 또렷하게
  c.font='800 23px "Apple SD Gothic Neo",Arial,sans-serif'; c.fillStyle='#8b6ff0'; c.fillText('www.playmallow.com',W/2,696);
  return cv;
}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function share(){
  if(!LAST) return; gtag('event','unse_share',{});
  const cv=drawCard();
  cv.toBlob(function(blob){
    const file=new File([blob],'mallow-unse.png',{type:'image/png'});
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file],text:'오늘의 내 운세 🔮 playmallow.com/unse'}).catch(()=>{});
    } else {
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='mallow-unse.png'; a.click();
    }
  },'image/png');
}

/* ---------- 이벤트 ---------- */
document.getElementById('goBtn').onclick=compute;
document.getElementById('shareBtn').onclick=share;
document.getElementById('againBtn').onclick=function(){document.getElementById('result').style.display='none';document.getElementById('inputCard').style.display='block';window.scrollTo({top:0,behavior:'smooth'});};
(function(){try{const b=localStorage.getItem('unse_birth');if(b)document.getElementById('birth').value=b;const t=localStorage.getItem('unse_time');if(t)document.getElementById('btime').value=t;}catch(e){}})();
</script>
