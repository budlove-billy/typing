const LUCK_COLORS=[{n:'코랄 핑크',x:'#ff8aa0'},{n:'라벤더',x:'#b79bf5'},{n:'민트',x:'#5ec6b0'},{n:'하늘',x:'#7fb3ff'},{n:'레몬',x:'#f5d64a'},{n:'살구',x:'#ffb877'},{n:'로즈',x:'#f06292'},{n:'올리브',x:'#9fb35a'},{n:'터콰이즈',x:'#2fc7c0'},{n:'플럼',x:'#a06ef8'},{n:'하양',x:'#f2f2f7'},{n:'남색',x:'#5b6b9e'}];
const LUCK_ITEMS=['따뜻한 커피','손거울','작은 화분','파란 펜','향초','포스트잇','텀블러','이어폰','손수건','반짝이는 것','종이 노트','작은 인형','귤 하나','우산','열쇠고리','머그컵','책갈피','스티커','작은 초콜릿','안경닦이','손목시계','미니 선인장'];

function hashStr(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function kstDate(){return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10);}
function pick(rng,arr){return arr[Math.floor(rng()*arr.length)];}
function lvl(rng){const r=rng();return r<0.5?{c:'lv-good',t:'좋음'}:r<0.85?{c:'lv-mid',t:'보통'}:{c:'lv-low',t:'주의'};}
let LAST=null;
const logoImg=new Image(); logoImg.src='/icon-192.png';

function compute(){
  const bv=document.getElementById('birth').value;
  if(!bv){ alert('생년월일을 입력해 주세요 🙂'); return; }
  const [Y,M,D]=bv.split('-').map(Number);
  if(new Date(bv)>new Date()){ alert('미래 날짜는 볼 수 없어요 😅'); return; }
  try{localStorage.setItem('zodiac_birth',bv);localStorage.setItem('zodiac_seen',kstDate());}catch(e){}
  gtag('event','zodiac_view',{});

  const idx=signIndex(M,D), sg=SIGNS[idx], el=ELEM[sg.el];
  let traitTxt='<b>'+sg.t+'</b> 성격의 <b>'+sg.n+'</b>. '+el.adj+' <b>'+sg.el+'</b>의 기운을 지녔어요.';

  const rng=mulberry32(hashStr(sg.n+'|'+kstDate())); // 같은 별자리는 하루 동안 같은 운세
  const starN=2+Math.floor(rng()*4);
  const totalTxt=pick(rng, starN>=4?TOTAL_HI:starN===3?TOTAL_MID:TOTAL_LO);
  const fields=[{i:'💗',n:'애정운',c:pick(rng,LOVE),v:lvl(rng)},{i:'💰',n:'금전운',c:pick(rng,MONEY),v:lvl(rng)},{i:'🍀',n:'건강운',c:pick(rng,HEALTH),v:lvl(rng)},{i:'📚',n:'학업·일운',c:pick(rng,WORK),v:lvl(rng)}];
  const lc=pick(rng,LUCK_COLORS), ln=1+Math.floor(rng()*45), li=pick(rng,LUCK_ITEMS), say=pick(rng,SAY);

  document.getElementById('zSym').textContent=sg.s;
  document.getElementById('zName').textContent=sg.n;
  document.getElementById('zSub').textContent=dateRangeText(idx)+' · '+Y+'년생';
  const eb=document.getElementById('elemBadge'); eb.textContent=sg.el+' 별자리'; eb.style.background=el.bg; eb.style.color=el.fc;
  document.getElementById('trait').innerHTML=traitTxt;
  document.getElementById('match').textContent='🤝 잘 맞는 별자리: '+goodSign(idx);
  document.getElementById('todayLabel').textContent='· '+kstDate();
  const starEl=document.getElementById('stars'); starEl.textContent='★★★★★☆☆☆☆☆'.slice(5-starN,10-starN); starEl.classList.toggle('smax',starN===5); starEl.setAttribute('role','img'); starEl.setAttribute('aria-label','오늘의 총운 5점 만점에 '+starN+'점');
  document.body.setAttribute('data-star',String(starN));
  document.getElementById('total').textContent=totalTxt;
  document.getElementById('fields').innerHTML=fields.map(f=>'<div class="frow"><div class="fi">'+f.i+'</div><div class="ft"><div class="fn">'+f.n+'</div><div class="fc">'+f.c+'</div></div><div class="fv '+f.v.c+'">'+f.v.t+'</div></div>').join('');
  document.getElementById('luckColor').innerHTML='<span class="swatch" style="background:'+lc.x+'"></span>'+lc.n;
  document.getElementById('luckNum').textContent=ln;
  document.getElementById('luckItem').textContent=li;
  document.getElementById('say').textContent=say;

  document.getElementById('inputCard').style.display='none';
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
  LAST={sg,starN,totalTxt,lc,ln,say};
}
function wrap(ctx,text,x,y,maxW,lh){const words=text.split(' ');let line='',yy=y;for(const w of words){const test=line+w+' ';if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line.trim(),x,yy);line=w+' ';yy+=lh;}else line=test;}ctx.fillText(line.trim(),x,yy);return yy;}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function drawCard(){
  const L=LAST; const cv=document.getElementById('shareCanvas'), c=cv.getContext('2d'), W=600,H=820;
  const GRAD={5:['#f7c65a','#ff8aa0'],4:['#c79bf5','#ff8aa0'],3:['#8fb2f0','#b79bf5'],2:['#8fb2f0','#7e8fd0']}[L.starN]||['#8fb2f0','#b79bf5'];
  const g=c.createLinearGradient(0,0,0,H); g.addColorStop(0,GRAD[0]); g.addColorStop(1,GRAD[1]); c.fillStyle=g; c.fillRect(0,0,W,H);
  c.fillStyle='#fff'; roundRect(c,40,50,W-80,H-100,28); c.fill();
  c.textAlign='center'; c.textBaseline='alphabetic';
  c.font='800 36px "Apple SD Gothic Neo",Arial,sans-serif';
  const mw=54,gap=12,bw=c.measureText('Mallow').width,x0=(W-(mw+gap+bw))/2,topY=74;
  if(logoImg.complete&&logoImg.naturalWidth>0){ c.drawImage(logoImg,x0,topY,mw,mw); }
  c.textAlign='left'; c.fillStyle='#2a2140'; c.fillText('Mallow',x0+mw+gap,topY+mw*0.72); c.textAlign='center';
  c.font='96px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#8b6ff0'; c.fillText(L.sg.s,W/2,244);
  c.font='800 34px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#2a2140'; c.fillText(L.sg.n+' · '+L.sg.el,W/2,296);
  c.font='30px sans-serif'; c.fillStyle='#f0b429'; c.fillText('★★★★★☆☆☆☆☆'.slice(5-L.starN,10-L.starN),W/2,344);
  c.font='600 22px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#3a3255'; wrap(c,L.totalTxt,W/2,392,W-150,34);
  c.font='700 19px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#7d7495'; c.fillText('행운의 색',W/2-120,520); c.fillText('행운의 숫자',W/2+120,520);
  c.beginPath(); c.arc(W/2-120,564,18,0,7); c.fillStyle=L.lc.x; c.fill();
  c.font='800 34px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#2a2140'; c.fillText(L.ln,W/2+120,576);
  c.font='700 20px "Apple SD Gothic Neo",sans-serif'; c.fillStyle='#8b6ff0'; wrap(c,L.say,W/2,640,W-150,30);
  c.font='800 23px "Apple SD Gothic Neo",Arial,sans-serif'; c.fillStyle='#8b6ff0'; c.fillText('www.playmallow.com',W/2,696);
  return cv;
}
function share(){ if(!LAST) return; gtag('event','zodiac_share',{}); const cv=drawCard();
  cv.toBlob(function(blob){ const file=new File([blob],'mallow-zodiac.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){ navigator.share({files:[file],text:'오늘의 내 별자리 운세 ⭐ playmallow.com/zodiac'}).catch(()=>{}); }
    else{ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='mallow-zodiac.png'; a.click(); } },'image/png'); }

document.getElementById('goBtn').onclick=compute;
document.getElementById('shareBtn').onclick=share;
document.getElementById('againBtn').onclick=function(){document.getElementById('result').style.display='none';document.getElementById('inputCard').style.display='block';window.scrollTo({top:0,behavior:'smooth'});};
(function(){try{const b=localStorage.getItem('zodiac_birth');if(b)document.getElementById('birth').value=b;}catch(e){}})();
</script>
