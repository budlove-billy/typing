let LANG='ko';
function detectLang(){let l=null;try{l=new URLSearchParams(location.search).get('lang');}catch(e){}if(!l){try{l=localStorage.getItem('brain.lang');}catch(e){}}return ['ko','en','th'].includes(l)?l:'ko';}

/* ===== 생성기(.logs/queens_sim.mjs 검증본 이식) ===== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return h>>>0;}
function kstDate(){return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10);}
function shuf(a,rng){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function placeCrowns(N,rng){const cols=new Array(N).fill(-1),used=new Array(N).fill(false);
  function bt(r){if(r===N)return true;for(const c of shuf([...Array(N).keys()],rng)){if(used[c])continue;if(r>0&&Math.abs(c-cols[r-1])<2)continue;cols[r]=c;used[c]=true;if(bt(r+1))return true;cols[r]=-1;used[c]=false;}return false;}
  return bt(0)?cols.map((c,r)=>[r,c]):null;}
function growRegions(N,crowns,rng){const region=Array.from({length:N},()=>new Array(N).fill(-1));const fr=[];
  function push(r,c,g){[[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<N&&nc>=0&&nc<N&&region[nr][nc]===-1)fr.push([nr,nc,g]);});}
  crowns.forEach(([r,c],i)=>{region[r][c]=i;});crowns.forEach(([r,c],i)=>push(r,c,i));let asg=N;
  while(asg<N*N&&fr.length){const k=Math.floor(rng()*fr.length);const [r,c,g]=fr.splice(k,1)[0];if(region[r][c]!==-1)continue;region[r][c]=g;asg++;push(r,c,g);}
  return asg<N*N?null:region;}
function countSol(N,region,limit){const colU=new Array(N).fill(false),regU=new Array(N).fill(false),cols=new Array(N).fill(-1);let cnt=0;
  function bt(r){if(cnt>=limit)return;if(r===N){cnt++;return;}for(let c=0;c<N;c++){if(colU[c])continue;const g=region[r][c];if(regU[g])continue;if(r>0&&Math.abs(c-cols[r-1])<2)continue;cols[r]=c;colU[c]=true;regU[g]=true;bt(r+1);cols[r]=-1;colU[c]=false;regU[g]=false;}}
  bt(0);return cnt;}
function genPuzzle(N,seed){const rng=mulberry32(seed);const crowns=placeCrowns(N,rng);if(!crowns)return null;const region=growRegions(N,crowns,rng);if(!region)return null;
  const sz=new Array(N).fill(0);region.forEach(row=>row.forEach(v=>sz[v]++));if(Math.max(...sz)>Math.ceil(N*1.9))return null;
  if(countSol(N,region,2)!==1)return null;return {region,crowns};}
function genDaily(N,daySeed){for(let k=0;k<8000;k++){const p=genPuzzle(N,(daySeed+k*2654435761)>>>0);if(p)return p;}return null;}

/* ===== 상태 ===== */
const REGCOL=['#f7b9cf','#b9d4f7','#c8f0cf','#f7e2a8','#d8c3f5','#a8ecec','#f7c9a8','#c9d0e8'];
let N=7, REGION=null, ST=null, DAILY=true, DAYSEED=0;
let startT=0, tick=null, WON=false;
function fmt(ms){const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function startTimer(){startT=Date.now();if(tick)clearInterval(tick);tick=setInterval(()=>{if(!WON)document.getElementById('timer').textContent=fmt(Date.now()-startT);},500);}

function newPuzzle(daily){
  DAILY=daily; WON=false;
  DAYSEED = daily ? hashStr('queens|'+N+'|'+kstDate()) : (hashStr('queens|'+N+'|r')^Math.floor(perfRand()*1e9))>>>0;
  const p=genDaily(N,DAYSEED); REGION=p.region;
  ST=Array.from({length:N},()=>new Array(N).fill(0)); // 0 empty,1 X,2 crown
  document.getElementById('wonBox').innerHTML=''; document.getElementById('timer').textContent='0:00';
  renderBoard(); renderBtns(); startTimer();
}
let _rc=0; function perfRand(){ _rc=(_rc*1103515245+12345)&0x7fffffff; return ((Date.now()%100000)+_rc%100000)/100000%1; }

function renderBoard(){
  const b=document.getElementById('board'); b.style.gridTemplateColumns='repeat('+N+',1fr)';
  b.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement('div'); d.className='cell'; d.style.background=REGCOL[REGION[r][c]%REGCOL.length];
    d.dataset.r=r; d.dataset.c=c;
    d.onclick=()=>tap(r,c);
    b.appendChild(d);
  }
  paint();
}
function paint(){
  const bad=conflicts();
  document.querySelectorAll('#board .cell').forEach(d=>{
    const r=+d.dataset.r,c=+d.dataset.c,s=ST[r][c];
    d.innerHTML = s===2?'👑':(s===1?'<span class="x">✕</span>':'');
    d.classList.toggle('bad', bad.has(r*N+c));
  });
}
function tap(r,c){ if(WON) return; ST[r][c]=(ST[r][c]+1)%3; paint(); checkWin(); }
function conflicts(){
  const bad=new Set(); const crowns=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(ST[r][c]===2) crowns.push([r,c]);
  const rowc={},colc={},regc={};
  crowns.forEach(([r,c])=>{ (rowc[r]=rowc[r]||[]).push([r,c]); (colc[c]=colc[c]||[]).push([r,c]); const g=REGION[r][c]; (regc[g]=regc[g]||[]).push([r,c]); });
  Object.values(rowc).forEach(a=>{if(a.length>1)a.forEach(([r,c])=>bad.add(r*N+c));});
  Object.values(colc).forEach(a=>{if(a.length>1)a.forEach(([r,c])=>bad.add(r*N+c));});
  Object.values(regc).forEach(a=>{if(a.length>1)a.forEach(([r,c])=>bad.add(r*N+c));});
  for(let i=0;i<crowns.length;i++)for(let j=i+1;j<crowns.length;j++){const [r1,c1]=crowns[i],[r2,c2]=crowns[j];if(Math.abs(r1-r2)<=1&&Math.abs(c1-c2)<=1){bad.add(r1*N+c1);bad.add(r2*N+c2);}}
  return bad;
}
function checkWin(){
  let cnt=0; for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(ST[r][c]===2) cnt++;
  if(cnt!==N) return;
  if(conflicts().size>0){ toast(TX[LANG].toastBad); return; }
  WON=true; if(tick)clearInterval(tick); const t=fmt(Date.now()-startT);
  gtag('event','queens_win',{size:N,daily:DAILY});
  if(DAILY){ try{localStorage.setItem('queens_done',kstDate());}catch(e){} }
  const d=TX[LANG];
  document.getElementById('wonBox').innerHTML='<div class="won"><div class="big">'+d.won+'</div><div class="t">'+d.wonTime(t)+'</div></div>';
  document.getElementById('btns').innerHTML='<button class="btn" id="shareBtn">'+d.share+'</button><button class="btn sub" id="againBtn">'+d.again+'</button>';
  document.getElementById('shareBtn').onclick=()=>share(t);
  document.getElementById('againBtn').onclick=()=>newPuzzle(false);
  toastWin(t);
}
function renderBtns(){
  const d=TX[LANG];
  document.getElementById('btns').innerHTML='<button class="btn sub" id="newBtn">🔀 '+d.newGame+'</button>';
  document.getElementById('newBtn').onclick=()=>newPuzzle(false);
}
let _lastT='';
function toastWin(t){ _lastT=t; }
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600);}

/* ===== 공유 카드 ===== */
const logoImg=new Image(); logoImg.src='/mallow-logo.svg';
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function drawCard(t){
  const cv=document.getElementById('shareCanvas'),c=cv.getContext('2d'),W=600,H=820,d=TX[LANG];
  const g=c.createLinearGradient(0,0,0,H);g.addColorStop(0,'#8b6ff0');g.addColorStop(1,'#ff8aa0');c.fillStyle=g;c.fillRect(0,0,W,H);
  c.fillStyle='#fff';roundRect(c,40,50,W-80,H-100,28);c.fill();
  c.textAlign='center';c.textBaseline='alphabetic';
  c.font='800 34px "Apple SD Gothic Neo",Arial,sans-serif';
  const mw=50,gap=11,bw=c.measureText('Mallow').width,x0=(W-(mw+gap+bw))/2,topY=78;
  if(logoImg.complete&&logoImg.naturalWidth>0)c.drawImage(logoImg,x0,topY,mw,mw);
  c.textAlign='left';c.fillStyle='#2a2140';c.fillText('Mallow',x0+mw+gap,topY+mw*0.72);c.textAlign='center';
  c.font='700 20px "Apple SD Gothic Neo",sans-serif';c.fillStyle='#8b6ff0';c.fillText('👑 '+d.share1,W/2,168);
  // 완성 보드
  const cell=Math.min(58,Math.floor(380/N)), bw2=cell*N, bx=(W-bw2)/2, by=210;
  for(let r=0;r<N;r++)for(let cc=0;cc<N;cc++){
    c.fillStyle=REGCOL[REGION[r][cc]%REGCOL.length]; const x=bx+cc*cell, y=by+r*cell;
    roundRect(c,x+2,y+2,cell-4,cell-4,7); c.fill();
    if(ST[r][cc]===2){ c.font=Math.floor(cell*0.62)+'px sans-serif'; c.fillStyle='#2a2140'; c.textBaseline='middle'; c.fillText('👑',x+cell/2,y+cell/2+2); c.textBaseline='alphabetic'; }
  }
  const yb=by+bw2+52;
  c.font='800 30px "Apple SD Gothic Neo",sans-serif';c.fillStyle='#2a2140';c.fillText(d.won+'  '+t,W/2,yb);
  c.font='600 18px "Apple SD Gothic Neo",sans-serif';c.fillStyle='#7d7495';c.fillText(d.share2(kstDate())+' · '+N+'×'+N,W/2,yb+34);
  c.font='800 22px "Apple SD Gothic Neo",Arial,sans-serif';c.fillStyle='#8b6ff0';c.fillText('www.playmallow.com',W/2,H-58);
  return cv;
}
function share(t){ gtag('event','queens_share',{}); const cv=drawCard(t);
  cv.toBlob(function(blob){const file=new File([blob],'mallow-crown.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],text:TX[LANG].shareText(t)}).catch(()=>{});}
    else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mallow-crown.png';a.click();}},'image/png'); }

function applyLang(){const d=TX[LANG];
  document.getElementById('langSel').value=LANG;
  document.getElementById('t-home').textContent=d.home;
  document.getElementById('t-title').textContent=d.title;
  document.getElementById('t-tagline').textContent=d.tagline;
  document.getElementById('t-clear').textContent=d.clear;
  document.getElementById('t-hint').innerHTML=d.hint;
  document.getElementById('t-disc').innerHTML=d.disc;
  document.getElementById('t-footer').textContent=d.footer;
  document.getElementById('dateBar').textContent=d.date(kstDate());
  document.title=d.docTitle;
  if(!WON) renderBtns(); // 버튼 라벨 갱신
}
function renderSizes(){
  const wrap=document.getElementById('sizes'); wrap.innerHTML='';
  [6,7,8].forEach(n=>{const b=document.createElement('button');b.textContent=n+'×'+n;b.className=n===N?'on':'';b.onclick=()=>{N=n;renderSizes();newPuzzle(DAILY);};wrap.appendChild(b);});
}
function setLang(l){LANG=['ko','en','th'].includes(l)?l:'ko';try{localStorage.setItem('brain.lang',LANG);}catch(e){}document.documentElement.lang=LANG;applyLang();}
document.getElementById('clearBtn').onclick=()=>{ if(WON)return; ST=Array.from({length:N},()=>new Array(N).fill(0)); paint(); };

LANG=detectLang(); document.documentElement.lang=LANG;
renderSizes(); applyLang(); newPuzzle(true);
</script>
